name: Verlof bijwerken
on:
  schedule:
    - cron: '0 5 * * *'      # elke dag 05:00 UTC (~07:00 NL). Aanpasbaar.
  workflow_dispatch: {}       # handmatig starten via de Actions-tab
permissions:
  contents: read
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Repo ophalen
        uses: actions/checkout@v4
      - name: Nmbrs-feed ophalen
        env:
          NMBRS_URL: ${{ secrets.NMBRS_URL }}
        run: curl -sSL "$NMBRS_URL" -o feed.ics
      - name: verlof.json maken
        run: python3 parse_verlof.py feed.ics verlof.json
      - name: Gist bijwerken
        env:
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          python3 -c "import json; c=open('verlof.json',encoding='utf-8').read(); open('payload.json','w').write(json.dumps({'files':{'gistfile1.txt':{'content':c}}}))"
          code=$(curl -sS -X PATCH \
            -H "Authorization: Bearer $GIST_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/gists/$GIST_ID" \
            --data @payload.json -o resp.json -w "%{http_code}")
          echo "HTTP $code"
          test "$code" = "200"
          python3 -c "import json; r=json.load(open('resp.json')); print('Gist bijgewerkt, bestanden:', list((r.get('files') or {}).keys()))"
